Quick start
Fork or clone this repo
Edit alerts.yaml with your tickers and thresholds
Set repo secrets:
TELEGRAM_BOT_TOKEN — from @BotFather
TELEGRAM_CHAT_ID — your Telegram user/chat ID
DISCORD_WEBHOOK_URL — optional, server channel webhook
Commit and push. The workflow runs automatically every 15 minutes.
Configuration
Each alert in alerts.yaml:

Field	Values	Notes
symbol	e.g. AAPL, bitcoin	Stock ticker or CoinGecko ID
kind	stock (default) or crypto	Which data source to use
rule	above or below	Trigger condition
value	number (USD)	Threshold
Reset a fired alert by deleting its entry from state/fired.json.

