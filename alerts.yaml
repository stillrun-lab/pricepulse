### `alerts.yaml`
```yaml
# Pricepulse — alert configuration
#
# kind:   "stock" (default, Yahoo Finance) or "crypto" (CoinGecko ID, lowercase)
# rule:   "above" or "below"
# value:  threshold price in USD
#
# Each alert fires ONCE when the rule condition is met. Reset by deleting
# the matching entry from state/fired.json.

alerts:
  - symbol: AAPL
    kind: stock
    rule: above
    value: 100.00

  - symbol: TSLA
    kind: stock
    rule: below
    value: 200.00

  - symbol: bitcoin
    kind: crypto
    rule: above
    value: 100000

  - symbol: ethereum
    kind: crypto
    rule: below
    value: 3000
